<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow p-4">
        <h3 class="text-center text-success">THANH TOÁN</h3>

        <p><b>Phòng:</b> <span th:text="${hd.phong}"></span></p>
        <p><b>Tháng:</b> <span th:text="${hd.thang}"></span></p>

        <hr>

        <p>Tiền phòng: <span th:text="${hd.tienPhong}"></span></p>
        <p>Tiền điện: <span th:text="${hd.tienDien}"></span></p>
        <p>Tiền nước: <span th:text="${hd.tienNuoc}"></span></p>
        <p>Tiền dịch vụ: <span th:text="${hd.tienDichVu}"></span></p>

        <h4 class="text-danger">Tổng: <span th:text="${hd.tongTien}"></span></h4>

        <hr>

        <h5>Chuyển khoản</h5>
        <p><b>STK:</b> 01234</p>
        <p><b>Ngân hàng:</b> ABC</p>
        <p><b>Nội dung:</b> <span th:text="'Phòng ' + ${hd.phong} + ' - tháng ' + ${hd.thang}"></span></p>

        <div class="text-center mt-3">
            <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Phong ' + ${hd.phong}"
                 class="img-thumbnail"/>
        </div>

        <div class="text-center mt-3">
            <span class="badge bg-warning" th:if="${hd.trangThai=='Chưa thanh toán'}">Chưa thanh toán</span>
            <span class="badge bg-success" th:if="${hd.trangThai=='Đã thanh toán'}">Đã thanh toán</span>
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn của tôi | Tenant Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --tenant-primary: #6366f1;
            --tenant-secondary: #4f46e5;
            --bg-light: #f9fafb;
            --text-main: #111827;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
        }

        .header-banner {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 60px 0 100px 0;
            color: white;
            border-radius: 0 0 40px 40px;
            margin-bottom: -60px;
        }

        .card-invoice {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .card-invoice:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .room-indicator {
            width: 50px;
            height: 50px;
            background: #e0e7ff;
            color: var(--tenant-primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0 auto 15px auto;
        }

        .price-display {
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 800;
            letter-spacing: -1px;
            margin: 15px 0;
        }

        /* Badge Trạng thái */
        .status-pill {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-unpaid { background-color: #fef2f2; color: #ef4444; }
        .status-paid { background-color: #f0fdf4; color: #22c55e; }

        /* Nút thanh toán */
        .btn-pay {
            background: var(--tenant-primary);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
            transition: 0.3s;
        }

        .btn-pay:hover {
            background: var(--tenant-secondary);
            transform: scale(1.02);
            color: white;
        }

        .btn-done {
            background: #f3f4f6;
            color: #9ca3af;
            border-radius: 16px;
            padding: 14px;
            font-weight: 600;
            border: none;
        }

        .invoice-details {
            font-size: 0.85rem;
            color: #6b7280;
            background: #f9fafb;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="header-banner text-center">
    <div class="container">
        <h2 class="fw-bold mb-2">Xin chào! 👋</h2>
        <p class="opacity-75">Đây là danh sách hóa đơn thuê phòng của bạn</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="item : ${list}">
            <div class="card card-invoice p-4">
                <div class="text-center">
                    <div class="room-indicator">
                        <span th:text="${item.phong}"></span>
                    </div>

                    <h5 class="fw-bold mb-1">Tháng <span th:text="${item.thang} + ' / ' + ${item.nam}"></span></h5>

                    <div class="mb-3">
                        <span th:if="${item.trangThai != 'DA_THANH_TOAN'}" class="status-pill status-unpaid">
                            <i class="bi bi-exclamation-circle me-1"></i> Chưa đóng
                        </span>
                        <span th:if="${item.trangThai == 'DA_THANH_TOAN'}" class="status-pill status-paid">
                            <i class="bi bi-check-all me-1"></i> Đã hoàn tất
                        </span>
                    </div>

                    <div class="price-display" th:text="${#numbers.formatDecimal(item.tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>

                    <div class="invoice-details d-flex justify-content-around">
                        <span>💡 Điện: <b class="text-dark" th:text="${#numbers.formatDecimal(item.tienDien, 0, 'COMMA', 0, 'POINT')}"></b></span>
                        <span>💧 Nước: <b class="text-dark" th:text="${#numbers.formatDecimal(item.tienNuoc, 0, 'COMMA', 0, 'POINT')}"></b></span>
                    </div>

                    <div class="d-grid">
                        <a th:if="${item.trangThai != 'DA_THANH_TOAN'}"
                           th:href="@{/hoadon/user/payment/{id}(id=${item.id})}"
                           class="btn btn-pay">
                            Thanh toán ngay <i class="bi bi-arrow-right ms-2"></i>
                        </a>

                        <button th:if="${item.trangThai == 'DA_THANH_TOAN'}"
                                class="btn btn-done" disabled>
                            <i class="bi bi-patch-check-fill text-success me-2"></i> Đã thanh toán xong
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(list)}" class="text-center mt-5 py-5">
            <div class="display-1 text-muted opacity-25 mb-3">
                <i class="bi bi-file-earmark-text"></i>
            </div>
            <h5 class="text-muted">Bạn hiện không có hóa đơn nào</h5>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

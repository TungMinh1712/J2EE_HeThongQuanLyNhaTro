<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2>Thanh toán hóa đơn</h2>

<p><b>Phòng:</b> <span th:text="${hd.phong}"></span></p>
<p><b>Tổng tiền:</b> <span th:text="${hd.tongTien}"></span></p>

<hr>

<h4>Thông tin chuyển khoản</h4>
<p>STK: <span th:text="${hd.stk}"></span></p>
<p>Ngân hàng: <span th:text="${hd.nganHang}"></span></p>
<p>Nội dung: <span th:text="${hd.noiDungCK}"></span></p>

<hr>

<h4>QR Code</h4>

<img th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='
    + ${hd.stk} + '-' + ${hd.noiDungCK}}" />

<br><br>

<a th:href="@{'/hoadon/user/pay/' + ${hd.id}}"
   class="btn btn-success">Tôi đã thanh toán</a>

</body>
</html>

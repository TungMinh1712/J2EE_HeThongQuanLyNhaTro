<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form hóa đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <h3 class="text-center">Tạo hóa đơn</h3>

    <form th:action="@{/hoadon/save}" method="post" th:object="${hoadon}" class="card p-4 shadow">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-2">
            <label>Phòng</label>
            <input type="text" class="form-control" th:field="*{phong}">
        </div>

        <div class="mb-2">
            <label>Tháng</label>
            <input type="number" class="form-control" th:field="*{thang}">
        </div>

        <div class="mb-2">
            <label>Năm</label>
            <input type="number" class="form-control" th:field="*{nam}">
        </div>

        <div class="mb-2">
            <label>Tiền phòng</label>
            <input type="number" class="form-control" th:field="*{tienPhong}">
        </div>

        <div class="mb-2">
            <label>Tiền điện</label>
            <input type="number" class="form-control" th:field="*{tienDien}">
        </div>

        <div class="mb-2">
            <label>Tiền nước</label>
            <input type="number" class="form-control" th:field="*{tienNuoc}">
        </div>

        <div class="mb-2">
            <label>Tiền dịch vụ</label>
            <input type="number" class="form-control" th:field="*{tienDichVu}">
        </div>

        <button class="btn btn-primary mt-3">Lưu</button>
    </form>

</div>
</body>
</html>

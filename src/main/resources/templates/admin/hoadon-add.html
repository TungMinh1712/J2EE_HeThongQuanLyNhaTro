<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo hóa đơn mới | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4361ee 0%, #3f37c9 100%);
            --bg-body: #f8f9fc;
            --input-focus: #4361ee;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: #2d3436;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .form-container {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng trang trí góc */
        .form-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: var(--primary-gradient);
        }

        .header-section {
            margin-bottom: 40px;
        }

        .header-section h2 {
            font-weight: 800;
            letter-spacing: -1px;
            color: #1a1a1a;
        }

        /* Tùy chỉnh Input */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #636e72;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 18px;
            border: 1.5px solid #edf2f7;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
            outline: none;
        }

        /* Section Group */
        .input-group-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b2bec3;
            margin-top: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        /* Nút bấm */
        .btn-save {
            background: var(--primary-gradient);
            border: none;
            padding: 14px 40px;
            border-radius: 16px;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(67, 97, 238, 0.3);
            color: white;
        }

        .btn-cancel {
            background: transparent;
            border: 1.5px solid #dfe6e9;
            padding: 14px 40px;
            border-radius: 16px;
            font-weight: 600;
            color: #636e72;
            transition: 0.2s;
        }

        .btn-cancel:hover {
            background: #f1f2f6;
            color: #2d3436;
        }

        .icon-box {
            width: 35px;
            height: 35px;
            background: rgba(67, 97, 238, 0.1);
            color: var(--input-focus);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-container">
                <div class="header-section text-center">
                    <div class="icon-box mb-2">
                        <i class="bi bi-file-earmark-plus-fill fs-5"></i>
                    </div>
                    <h2>Tạo Hóa Đơn Mới</h2>
                    <p class="text-muted">Nhập đầy đủ thông tin chi tiết các khoản phí cho phòng trọ</p>
                </div>

                <form th:action="@{/admin/hoadon/save}" th:object="${hoadon}" method="post">
                    <div class="row g-4">

                        <div class="col-12">
                            <div class="input-group-title">Thông tin định danh</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-door-open"></i> Số phòng</label>
                            <input type="text" th:field="*{phong}" class="form-control" placeholder="Ví dụ: 101, 102" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label"><i class="bi bi-calendar3"></i> Tháng</label>
                            <input type="number" th:field="*{thang}" class="form-control" min="1" max="12" placeholder="MM" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label"><i class="bi bi-clock-history"></i> Năm</label>
                            <input type="number" th:field="*{nam}" class="form-control" placeholder="YYYY" required>
                        </div>

                        <div class="col-12">
                            <div class="input-group-title">Chi tiết các khoản phí (VNĐ)</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-cash-stack"></i> Tiền phòng</label>
                            <input type="number" th:field="*{tienPhong}" class="form-control" placeholder="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-lightning-charge"></i> Tiền điện</label>
                            <input type="number" th:field="*{tienDien}" class="form-control" placeholder="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-droplet"></i> Tiền nước</label>
                            <input type="number" th:field="*{tienNuoc}" class="form-control" placeholder="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"><i class="bi bi-stars"></i> Dịch vụ khác</label>
                            <input type="number" th:field="*{tienDichVu}" class="form-control" placeholder="0">
                        </div>

                        <div class="col-12 mt-5 text-center">
                            <hr class="mb-4 opacity-50">
                            <div class="d-flex justify-content-center gap-3">
                                <a href="/admin/hoadon" class="btn btn-cancel">
                                    <i class="bi bi-x-lg me-2"></i> Hủy bỏ
                                </a>
                                <button type="submit" class="btn btn-save">
                                    <i class="bi bi-check-lg me-2"></i> Lưu & Xuất hóa đơn
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <p class="text-center mt-4 text-muted small">
                Hệ thống sẽ tự động tính <strong>Tổng tiền</strong> dựa trên các khoản trên.
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

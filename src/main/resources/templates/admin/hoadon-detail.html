<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết chi phí</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 50px 0; }
        .detail-card { background: white; border-radius: 25px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .fee-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>
<div class="container">
    <div class="col-md-6 offset-md-3 detail-card">
        <h3 class="text-center fw-bold mb-4 text-primary">📑 CHI TIẾT CHI PHÍ</h3>
        <div class="fee-item"><span>Tiền phòng:</span><b th:text="${#numbers.formatDecimal(hd.tienPhong, 0, 'COMMA', 0, 'POINT')} + ' đ'"></b></div>
        <div class="fee-item"><span>Tiền điện:</span><b th:text="${#numbers.formatDecimal(hd.tienDien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></b></div>
        <div class="fee-item"><span>Tiền nước:</span><b th:text="${#numbers.formatDecimal(hd.tienNuoc, 0, 'COMMA', 0, 'POINT')} + ' đ'"></b></div>
        <div class="fee-item"><span>Dịch vụ:</span><b th:text="${#numbers.formatDecimal(hd.tienDichVu, 0, 'COMMA', 0, 'POINT')} + ' đ'"></b></div>
        <h4 class="text-center text-danger fw-bold mt-4">TỔNG: <span th:text="${#numbers.formatDecimal(hd.tongTien, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ</h4>
        <hr>
        <div class="d-grid mt-4">
            <a href="/admin/hoadon" class="btn btn-secondary btn-lg rounded-pill fw-bold">Quay lại Admin</a>
        </div>
    </div>
</div>
</body>
</html>

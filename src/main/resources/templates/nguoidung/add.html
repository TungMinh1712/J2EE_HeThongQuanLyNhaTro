<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head('Thêm người dùng')}"></head>
<body>

<div class="app-shell">
  <aside th:replace="~{layout :: sidebar('nguoidung')}"></aside>

  <main class="main">
    <div class="topbar">
      <div class="page-heading">
        <h1>Thêm người dùng</h1>
        <p>Tạo mới tài khoản admin hoặc user</p>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <div class="card-body">
          <form th:action="@{/nguoi-dung/save}" th:object="${nguoiDung}" method="post" class="form">
            <div class="form-row">
              <div class="form-group">
                <label for="hoTen">Họ tên</label>
                <input type="text" id="hoTen" th:field="*{hoTen}" placeholder="Nhập họ tên" required>
              </div>

              <div class="form-group">
                <label for="tenDangNhap">Tên đăng nhập</label>
                <input type="text" id="tenDangNhap" th:field="*{tenDangNhap}" placeholder="Nhập tên đăng nhập" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="matKhau">Mật khẩu</label>
                <input type="password" id="matKhau" th:field="*{matKhau}" placeholder="Nhập mật khẩu" required>
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="Nhập email">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="soDienThoai">Số điện thoại</label>
                <input type="text" id="soDienThoai" th:field="*{soDienThoai}" placeholder="Nhập số điện thoại">
              </div>

              <div class="form-group">
                <label for="vaiTro">Vai trò</label>
                <select id="vaiTro" th:field="*{vaiTro}">
                  <option value="ADMIN">ADMIN</option>
                  <option value="USER">USER</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="trangThaiHoatDong">Trạng thái hoạt động</label>
              <select id="trangThaiHoatDong" th:field="*{trangThaiHoatDong}">
                <option th:value="true">Hoạt động</option>
                <option th:value="false">Ngừng hoạt động</option>
              </select>
            </div>

            <div class="form-action">
              <button type="submit" class="btn btn-primary">Lưu người dùng</button>
              <a th:href="@{/nguoi-dung}" class="btn btn-secondary">Quay lại</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>

</body>
</html>

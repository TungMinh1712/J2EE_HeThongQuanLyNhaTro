<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head('Thêm phòng')}"></head>
<body>

<div class="app-shell">
    <aside th:replace="~{layout :: sidebar('phong')}"></aside>

    <main class="main">
        <div class="topbar">
            <div class="page-heading">
                <h1>Thêm phòng</h1>
                <p>Tạo mới thông tin phòng trọ</p>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/phong/save}" th:object="${phong}" method="post" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="maPhong">Mã phòng</label>
                                <input type="text" id="maPhong" th:field="*{maPhong}" placeholder="Ví dụ: P101" required>
                            </div>

                            <div class="form-group">
                                <label for="tenPhong">Tên phòng</label>
                                <input type="text" id="tenPhong" th:field="*{tenPhong}" placeholder="Ví dụ: Phòng 101" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="dienTich">Diện tích (m²)</label>
                                <input type="number" step="0.01" id="dienTich" th:field="*{dienTich}" placeholder="Nhập diện tích" required>
                            </div>

                            <div class="form-group">
                                <label for="giaThue">Giá thuê</label>
                                <input type="number" step="0.01" id="giaThue" th:field="*{giaThue}" placeholder="Nhập giá thuê" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="tienCoc">Tiền cọc</label>
                                <input type="number" step="0.01" id="tienCoc" th:field="*{tienCoc}" placeholder="Nhập tiền cọc">
                            </div>

                            <div class="form-group">
                                <label for="soNguoiToiDa">Số người tối đa</label>
                                <input type="number" id="soNguoiToiDa" th:field="*{soNguoiToiDa}" placeholder="Nhập số người tối đa" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="trangThai">Trạng thái</label>
                            <select id="trangThai" th:field="*{trangThai}">
                                <option value="CON_TRONG">Còn trống</option>
                                <option value="DA_THUE">Đã thuê</option>
                                <option value="DANG_BAO_TRI">Đang bảo trì</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="moTa">Mô tả</label>
                            <textarea id="moTa" th:field="*{moTa}" placeholder="Nhập mô tả phòng"></textarea>
                        </div>

                        <div class="form-action">
                            <button type="submit" class="btn btn-primary">Lưu phòng</button>
                            <a th:href="@{/phong}" class="btn btn-secondary">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>

</body>
</html>
